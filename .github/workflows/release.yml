name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify:
    name: verify tag & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: tag matches version in main.go
        run: |
          tag="${GITHUB_REF_NAME#v}"
          code="$(grep -oE 'const version = "[^"]+"' main.go | cut -d'"' -f2)"
          if [ "$tag" != "$code" ]; then
            echo "tag $tag != version $code in main.go" >&2
            exit 1
          fi
      - name: go test
        run: go test -count=1 ./...

  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o dist/spookiui_${{ matrix.goos }}_${{ matrix.goarch }} .
      - uses: actions/upload-artifact@v4
        with:
          name: spookiui_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/spookiui_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        working-directory: dist
        run: sha256sum spookiui_* > checksums.txt
      - name: list assets
        run: ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
